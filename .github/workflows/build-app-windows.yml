# Build for the Where-to-fly Windows app

name: Build Windows app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Install workloads
      shell: cmd
      run: |
        dotnet workload install maui

    - name: Build MapView project
      run: >
        dotnet build
        src/App/MapView/WhereToFly.App.MapView.csproj
        -f net10.0-android
        -c Release

    - name: Publish Windows app
      run: >
        dotnet publish
        src/App/Maui/WhereToFly.App.Maui.csproj
        -f net10.0-windows10.0.19041.0

    - name: Upload Windows app
      uses: actions/upload-artifact@v7
      with:
        name: Where-to-fly-Windows
        path: artifacts/publish/WhereToFly.App.Maui/release_net10.0-windows10.0.19041.0_win-x64/
        if-no-files-found: error
